<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lot Size Calculator | BullishFX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <main class="calc-container">
        <div class="calc-header">
            <h1>Position <span class="highlight-gold">Size Calculator</span></h1>
            <p>Calculate your risk before entering the market.</p>
        </div>

        <div class="calc-box">
            <div class="input-group">
                <label>Account Balance ($)</label>
                <input type="number" id="balance" placeholder="e.g. 10000" value="1000">
            </div>

            <div class="input-group">
                <label>Risk Percentage (%)</label>
                <input type="number" id="risk" placeholder="e.g. 1" value="1">
            </div>

            <div class="input-group">
                <label>Stop Loss (Pips)</label>
                <input type="number" id="stoploss" placeholder="e.g. 15" value="10">
            </div>

            <button onclick="calculateLot()" class="curriculum-link" style="width: 100%; cursor: pointer;">Calculate Position</button>

            <div class="result-display">
                <div class="result-item">
                    <span>Risk Amount:</span>
                    <h3 id="risk-amount">$0.00</h3>
                </div>
                <div class="result-item">
                    <span>Recommended Lot Size:</span>
                    <h3 id="lot-result" class="highlight-gold">0.00</h3>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" class="curriculum-link">Back to Home</a>
        </div>
    </main>

    <script>
        function calculateLot() {
            const balance = document.getElementById('balance').value;
            const risk = document.getElementById('risk').value;
            const stoploss = document.getElementById('stoploss').value;

            // Math: (Balance * (Risk/100)) / (Stoploss * 10)
            // Note: 10 is the multiplier for standard lots (1 pip = $10 for 1 lot on most pairs)
            const riskDollars = balance * (risk / 100);
            const lotSize = riskDollars / (stoploss * 10);

            document.getElementById('risk-amount').innerText = "$" + riskDollars.toFixed(2);
            document.getElementById('lot-result').innerText = lotSize.toFixed(2) + " Lots";
        }
    </script>
</body>
</html>
